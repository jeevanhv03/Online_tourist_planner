# Application Configuration
spring.application.name=tourist-planner

# Server Configuration
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/tourist_planner_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=11111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=OnlineTouristPlannerJWTSecretKey2024OnlineTouristPlannerJWTSecretKey2024
app.jwt.expiration=86400000

# Email Configuration (Gmail SMTP)
# IMPORTANT: For Gmail, use an "App Password", NOT your regular password.
# Guide: https://support.google.com/accounts/answer/185833
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password-from-google
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Admin Email for system notifications
app.admin.email=admin@touristplanner.com

# Frontend URL (For links in emails)
# Set this to your network IP (e.g., http://192.168.1.10:3000) if testing on mobile.
app.frontend.url=http://localhost:3000

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.otp=DEBUG
logging.level.org.springframework.security=DEBUG
